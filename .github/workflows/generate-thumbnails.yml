name: Generate Thumbnails

on:
  push:
    branches:
      - main
    paths:
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.png'
      - '**/*.webp'
  workflow_dispatch:   # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install sharp
      - run: node .github/scripts/generate-thumbnails.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto generate thumbnails"
          file_pattern: '**/*-thumb.*'
          branch: main
          skip_fetch: true
